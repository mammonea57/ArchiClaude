name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: archiclaude
          POSTGRES_PASSWORD: archiclaude
          POSTGRES_DB: archiclaude
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U archiclaude"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps for WeasyPrint + GEOS
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libgeos-dev libproj-dev proj-data

      - name: Install pgvector in Postgres service
        working-directory: .
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-16-pgvector
          PGPASSWORD=archiclaude psql -h localhost -U archiclaude -d archiclaude -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql://archiclaude:archiclaude@localhost:5432/archiclaude
        run: alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://archiclaude:archiclaude@localhost:5432/archiclaude
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate shared types
        run: |
          cd apps/backend
          pip install pydantic==2.9.2 pydantic-settings==2.6.1 email-validator==2.2.0 pyyaml==6.0.2
          python scripts/generate_ts_schemas.py

      - name: Typecheck
        run: pnpm --filter @archiclaude/frontend typecheck

      - name: Build
        run: pnpm --filter @archiclaude/frontend build
